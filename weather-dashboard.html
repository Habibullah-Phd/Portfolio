<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            transition: background 0.5s ease;
        }

        body.day {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body.night {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
        }

        .search-container {
            display: flex;
            gap: 10px;
            flex: 1;
            max-width: 500px;
            margin: 0 auto;
        }

        .search-input {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            outline: none;
            transition: background 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .search-input:focus {
            background: rgba(255, 255, 255, 0.3);
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.3);
            color: white;
            backdrop-filter: blur(10px);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-primary:hover {
            box-shadow: 0 10px 30px rgba(245, 87, 108, 0.4);
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .current-weather {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
            grid-column: 1 / 3;
        }

        .weather-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .location-time {
            flex: 1;
        }

        .location {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .date-time {
            font-size: 0.95rem;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .weather-main {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .weather-icon {
            font-size: 120px;
            line-height: 1;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .temp-section {
            flex: 1;
        }

        .current-temp {
            font-size: 4rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 10px;
        }

        .weather-description {
            font-size: 1.3rem;
            opacity: 0.9;
            margin-bottom: 20px;
            text-transform: capitalize;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .detail-item {
            text-align: center;
        }

        .detail-label {
            font-size: 0.85rem;
            opacity: 0.7;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .detail-value {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .forecast-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            transition: all 0.3s ease;
        }

        .forecast-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.15);
        }

        .forecast-time {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .forecast-icon {
            font-size: 50px;
            margin: 15px 0;
        }

        .forecast-temp {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .forecast-desc {
            font-size: 0.85rem;
            opacity: 0.8;
            text-transform: capitalize;
        }

        .section-title {
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            margin-top: 30px;
        }

        .error-message {
            background: rgba(255, 59, 48, 0.2);
            color: #ff3b30;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            border: 1px solid #ff3b30;
        }

        .error-message.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        .loading {
            display: none;
            text-align: center;
            color: white;
            padding: 40px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .empty-state {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 60px 40px;
            color: white;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            grid-column: 1 / 3;
        }

        .empty-state-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .empty-state-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .empty-state-text {
            opacity: 0.8;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .current-weather {
                grid-column: 1;
            }

            .weather-main {
                flex-direction: column;
                text-align: center;
            }

            .weather-details {
                grid-template-columns: repeat(2, 1fr);
            }

            .weather-icon {
                font-size: 80px;
            }

            .current-temp {
                font-size: 3rem;
            }

            .header {
                flex-direction: column;
                gap: 20px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .search-container {
                max-width: 100%;
            }
        }
    </style>
</head>
<body class="day">
    <div class="container">
        <div class="header">
            <h1>🌤️ Weather Dashboard</h1>
        </div>

        <div class="search-container">
            <input 
                type="text" 
                class="search-input" 
                id="cityInput" 
                placeholder="Search for a city..."
                autocomplete="off"
            >
            <button class="btn btn-primary" id="searchBtn">Search</button>
            <button class="btn" id="geolocationBtn">📍 Current Location</button>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Fetching weather data...</p>
        </div>

        <div class="main-grid" id="mainGrid">
            <div class="empty-state">
                <div class="empty-state-icon">🌍</div>
                <div class="empty-state-title">Welcome to Weather Dashboard</div>
                <div class="empty-state-text">Search for a city or use your current location to see weather information</div>
            </div>
        </div>

        <div class="section-title" id="forecastTitle" style="display: none;">📅 5-Day Forecast</div>
        <div class="forecast-grid" id="forecastGrid"></div>
    </div>

    <script>
        const API_KEY = 'b6fd43b3b3941e0b7ec1919b66432204'; // Free API key for demo
        const cityInput = document.getElementById('cityInput');
        const searchBtn = document.getElementById('searchBtn');
        const geolocationBtn = document.getElementById('geolocationBtn');
        const mainGrid = document.getElementById('mainGrid');
        const forecastGrid = document.getElementById('forecastGrid');
        const forecastTitle = document.getElementById('forecastTitle');
        const errorMessage = document.getElementById('errorMessage');
        const loading = document.getElementById('loading');

        // Event listeners
        searchBtn.addEventListener('click', searchCity);
        cityInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchCity();
        });
        geolocationBtn.addEventListener('click', getGeolocation);

        // Search city weather
        function searchCity() {
            const city = cityInput.value.trim();
            if (!city) {
                showError('Please enter a city name');
                return;
            }
            fetchWeather(city);
        }

        // Get user geolocation
        function getGeolocation() {
            if (navigator.geolocation) {
                showLoading(true);
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const { latitude, longitude } = position.coords;
                        fetchWeatherByCoords(latitude, longitude);
                    },
                    (error) => {
                        showLoading(false);
                        showError('Unable to get your location. Please enable location services.');
                    }
                );
            } else {
                showError('Geolocation is not supported by your browser');
            }
        }

        // Fetch weather by city name
        async function fetchWeather(city) {
            showLoading(true);
            hideError();
            try {
                const response = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`
                );
                
                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error('City not found');
                    }
                    throw new Error('Failed to fetch weather data');
                }
                
                const data = await response.json();
                displayCurrentWeather(data);
                fetchForecast(data.coord.lat, data.coord.lon);
                cityInput.value = '';
            } catch (error) {
                showError(error.message);
            } finally {
                showLoading(false);
            }
        }

        // Fetch weather by coordinates
        async function fetchWeatherByCoords(lat, lon) {
            try {
                const response = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`
                );
                
                if (!response.ok) {
                    throw new Error('Failed to fetch weather data');
                }
                
                const data = await response.json();
                displayCurrentWeather(data);
                fetchForecast(lat, lon);
            } catch (error) {
                showError(error.message);
            } finally {
                showLoading(false);
            }
        }

        // Fetch 5-day forecast
        async function fetchForecast(lat, lon) {
            try {
                const response = await fetch(
                    `https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`
                );
                
                if (!response.ok) {
                    throw new Error('Failed to fetch forecast data');
                }
                
                const data = await response.json();
                displayForecast(data.list);
            } catch (error) {
                console.error('Forecast error:', error);
            }
        }

        // Display current weather
        function displayCurrentWeather(data) {
            const { main, weather, wind, clouds, sys, name, dt } = data;
            const icon = getWeatherIcon(weather[0].main);
            
            // Update background based on day/night
            const isDayTime = dt > sys.sunrise && dt < sys.sunset;
            document.body.className = isDayTime ? 'day' : 'night';

            const temp = Math.round(main.temp);
            const feelsLike = Math.round(main.feels_like);
            
            const date = new Date(dt * 1000);
            const dateStr = date.toLocaleDateString('en-US', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
            const timeStr = date.toLocaleTimeString('en-US', { 
                hour: '2-digit', 
                minute: '2-digit' 
            });

            mainGrid.innerHTML = `
                <div class="current-weather">
                    <div class="weather-header">
                        <div class="location-time">
                            <div class="location">${name}</div>
                            <div class="date-time">${dateStr}</div>
                            <div class="date-time">${timeStr}</div>
                        </div>
                    </div>
                    
                    <div class="weather-main">
                        <div class="weather-icon">${icon}</div>
                        <div class="temp-section">
                            <div class="current-temp">${temp}°C</div>
                            <div class="weather-description">${weather[0].description}</div>
                            <div style="opacity: 0.8;">Feels like ${feelsLike}°C</div>
                        </div>
                    </div>

                    <div class="weather-details">
                        <div class="detail-item">
                            <div class="detail-label">💧 Humidity</div>
                            <div class="detail-value">${main.humidity}%</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">🌪️ Wind Speed</div>
                            <div class="detail-value">${main.speed || wind.speed} m/s</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">🔽 Pressure</div>
                            <div class="detail-value">${main.pressure} hPa</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">☁️ Cloudiness</div>
                            <div class="detail-value">${clouds.all}%</div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Display forecast
        function displayForecast(forecastData) {
            // Get forecasts for 8am, 4pm, 8pm for next 5 days
            const dailyForecasts = {};
            
            forecastData.forEach(item => {
                const date = new Date(item.dt * 1000).toLocaleDateString('en-US');
                if (!dailyForecasts[date]) {
                    dailyForecasts[date] = item;
                }
            });

            let html = '';
            let count = 0;
            
            Object.entries(dailyForecasts).forEach(([date, data]) => {
                if (count >= 5) return;
                
                const temp = Math.round(data.main.temp);
                const icon = getWeatherIcon(data.weather[0].main);
                const desc = data.weather[0].description;
                const dateObj = new Date(data.dt * 1000);
                const dateStr = dateObj.toLocaleDateString('en-US', { 
                    month: 'short', 
                    day: 'numeric' 
                });

                html += `
                    <div class="forecast-card">
                        <div class="forecast-time">${dateStr}</div>
                        <div class="forecast-icon">${icon}</div>
                        <div class="forecast-temp">${temp}°C</div>
                        <div class="forecast-desc">${desc}</div>
                    </div>
                `;
                count++;
            });

            if (html) {
                forecastTitle.style.display = 'block';
                forecastGrid.innerHTML = html;
            }
        }

        // Get weather icon
        function getWeatherIcon(description) {
            const desc = description.toLowerCase();
            const icons = {
                'clear': '☀️',
                'sunny': '☀️',
                'clouds': '☁️',
                'cloudy': '☁️',
                'overcast': '☁️',
                'rain': '🌧️',
                'rainy': '🌧️',
                'drizzle': '🌦️',
                'thunderstorm': '⛈️',
                'thunder': '⛈️',
                'snow': '❄️',
                'mist': '🌫️',
                'fog': '🌫️',
                'wind': '💨'
            };

            for (const [key, icon] of Object.entries(icons)) {
                if (desc.includes(key)) return icon;
            }
            return '🌤️';
        }

        // Helper functions
        function showLoading(show) {
            loading.classList.toggle('show', show);
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 5000);
        }

        function hideError() {
            errorMessage.classList.remove('show');
        }

        // Initialize with a default city
        window.addEventListener('load', () => {
            fetchWeather('London');
        });
    </script>
</body>
</html>
